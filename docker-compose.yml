services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: onehaven-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onehaven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onehaven_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-onehaven_market}
    ports:
      - "5432:5432"
    volumes:
      - onehaven_postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onehaven} -d ${POSTGRES_DB:-onehaven_market}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: onehaven-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      RUN_MIGRATIONS_ON_START: "true"
      ONEHAVEN_MCP_CONTRACT_PATH: /app/docs/mcp/tool_contracts.v1.json
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg2://onehaven:onehaven_dev_password@postgres:5432/onehaven_market}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      GZIP_MINIMUM_SIZE: ${GZIP_MINIMUM_SIZE:-1000}
      API_REQUEST_TIMEOUT_SECONDS: ${API_REQUEST_TIMEOUT_SECONDS:-30}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: onehaven-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy

volumes:
  onehaven_postgres_data:
