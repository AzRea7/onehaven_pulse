name: onehaven_pulse
version: "0.1.0"
config-version: 2

profile: onehaven_pulse

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  onehaven_pulse:
    staging:
      +materialized: view
      +schema: dbt_staging
    analytics:
      +materialized: view
      +schema: dbt_analytics_contract

seeds:
  onehaven_pulse:
    +schema: dbt_reference
