version: 2

models:
  - name: stg_market_monthly_metrics
    description: Staging contract over analytics.market_monthly_metrics.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - geo_id
              - period_month
    columns:
      - name: geo_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dim_geo')
                field: geo_id

      - name: period_month
        tests:
          - not_null

      - name: home_price_index
        tests:
          - no_negative

      - name: zhvi
        tests:
          - no_negative

      - name: median_sale_price
        tests:
          - no_negative

      - name: zori
        tests:
          - no_negative

      - name: median_rent
        tests:
          - no_negative

      - name: mortgage_rate_30y
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 25

      - name: unemployment_rate
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 40

      - name: payment_to_income_ratio
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 3

      - name: price_to_income_ratio
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 50

  - name: stg_market_metric_sources
    description: Staging contract over analytics.market_metric_sources.
    columns:
      - name: geo_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dim_geo')
                field: geo_id

      - name: period_month
        tests:
          - not_null

      - name: metric_name
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('valid_metric_names')
                field: metric_name

      - name: source
        tests:
          - not_null

      - name: dataset
        tests:
          - not_null

  - name: stg_dim_geo
    description: Staging contract over geo.dim_geo.
    columns:
      - name: geo_id
        tests:
          - not_null
          - unique

      - name: geo_type
        tests:
          - not_null
